# Sveltia CMS configuration — single-locale (English).
#
# Editing happens on STAGING (chrishemmings-co-uk.stage.denfrievilje.dk/admin)
# against the GitHub backend via the OAuth proxy (Caddy `/auth/*` →
# sveltia-auth). Prose fields use the `markdown` widget so copy stays flowing
# prose, not arrays of bullets.
#
# Two collections:
#   • General — site-wide settings reused across pages (site, contact details,
#     booking CTA, testimonials).
#   • Pages   — the actual pages (Home, Therapy & Coaching, Public Speaking,
#     Podcast, Get in touch).

backend:
  name: github
  repo: den-frie-vilje/chrishemmings.co.uk
  branch: staging
  base_url: https://chrishemmings-co-uk.stage.denfrievilje.dk/auth
  site_domain: chrishemmings-co-uk.stage.denfrievilje.dk

# Staging writes go straight to the staging branch (no editorial PR flow).
publish_mode: simple

media_folder: static/img
public_folder: /img

collections:
  - name: general
    label: General
    # No side preview pane — it renders a generic field dump, not the real
    # site. Editors review changes on the staging site instead.
    editor: { preview: false }
    files:
      - name: site
        label: Site
        file: src/content/site.json
        fields:
          - { name: name, label: Site name, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: description, label: Meta description, widget: text }
          - { name: themeColor, label: Theme colour, widget: string }
          - { name: footerNote, label: Footer note, widget: string, hint: "Use {year} for the year." }
          - { name: bacpRegisterUrl, label: BACP register link, widget: string, hint: "Official BACP profile, e.g. https://www.bacp.co.uk/therapists/<membership-number>" }

      - name: contact
        label: Contact details
        file: src/content/contact.json
        hint: "Overarching contact info — shown in the contact section site-wide and in the footer. The Get in touch PAGE copy lives under Pages → Get in touch."
        fields:
          - { name: heading, label: Contact section heading, widget: string }
          - { name: email, label: Email, widget: string }
          - { name: emailHref, label: Email link, widget: string }
          - { name: phone, label: Phone (display), widget: string }
          - { name: phoneHref, label: Phone link, widget: string }
          - { name: location, label: Location, widget: text }

      - name: booking
        label: Booking CTA
        file: src/content/booking.json
        hint: "The 'Book a free consultation' call-to-action used in the header, hero buttons and contact section."
        fields:
          - { name: label, label: Button label, widget: string }
          - { name: sub, label: Subtext, widget: text }
          - { name: href, label: Link, widget: string, hint: "A mailto: link so the button opens the visitor's email client, e.g. mailto:you@example.com?subject=Free 15-minute consultation" }

      - name: testimonials
        label: Testimonials
        file: src/content/testimonials.json
        fields:
          - name: therapy
            label: Therapy clients (anonymised)
            widget: list
            fields:
              - { name: quote, label: Quote, widget: text }
              - { name: name, label: Attribution, widget: string, hint: "Anonymised, e.g. \"Client, M, 28\"." }
              - { name: detail, label: Detail, widget: string, required: false }
              - { name: org, label: Organisation, widget: string, required: false }
          - name: speaking
            label: Public-speaking / commercial clients
            widget: list
            fields:
              - { name: quote, label: Quote, widget: text }
              - { name: name, label: Name / organisation, widget: string }
              - { name: detail, label: Role, widget: string, required: false }
              - { name: org, label: Organisation, widget: string, required: false }
              - { name: logo, label: Client logo, widget: image, required: false }

      - name: accolades
        label: Accolades
        file: src/content/accolades.json
        hint: "Awards and named-list recognitions, shown under the founder block on the home page and on the Public Speaking page. Newest first."
        fields:
          - name: items
            label: Accolades
            widget: list
            fields:
              - { name: title, label: Accolade, widget: string, hint: "e.g. \"Men & Boys Champion\" (leave the year out — there's a year field)." }
              - { name: year, label: Year, widget: string, required: false }
              - { name: org, label: Awarding body, widget: string }
              - { name: href, label: Source link, widget: string, required: false, hint: "Public page or PDF that names it; opens in a new tab." }

  - name: pages
    label: Pages
    # No side preview pane (see General) — review on staging.
    editor: { preview: false }
    files:
      - name: home
        label: Home
        file: src/content/home.json
        fields:
          - { name: navLabel, label: Navigation label, widget: string, hint: "How this page appears in the site menu." }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: titleAccent, label: Title descriptor (lighter line), widget: string }
              - { name: lead, label: Lead, widget: text }
              - { name: portrait, label: Portrait (framed) — social share & SEO, widget: image, hint: "A normal framed photo. Used for the social-share (OG) card and search results, NOT shown on the page itself." }
              - { name: cutout, label: Hero cutout (background removed), widget: image, hint: "The transparent PNG/WebP of Chris shown in the hero, leaning in from the right." }
              - { name: portraitAlt, label: Portrait alt text, widget: string }
              - { name: ctaPrimary, label: Primary CTA, widget: string }
              - { name: ctaSecondary, label: Secondary CTA, widget: string }
          - name: testimonialsNote
            label: "Testimonials → edit separately"
            widget: string
            required: false
            hint: "Testimonials are NOT edited here. They live under **General → Testimonials** (admin URL ends `/collections/general/entries/testimonials`). The homepage shows the first therapy testimonial automatically."
          - name: about
            label: About
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: markdown, buttons: [bold, italic, link], editor_components: [], modes: [rich_text] }
          - name: founder
            label: Founder of
            widget: object
            fields:
              - { name: intro, label: Intro, widget: string }
              - name: orgs
                label: Organisations
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: href, label: Link, widget: string, required: false }
                  - { name: logo, label: Logo, widget: image }
          - name: featuredIn
            label: Featured in (press / media)
            widget: object
            hint: "A scrolling strip of media outlets that have featured Chris's work, shown below the home-page testimonial."
            fields:
              - { name: title, label: Heading, widget: string }
              - name: logos
                label: Outlets
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: logo, label: Logo, widget: image, media_folder: "/static/img/logos/press", public_folder: "/img/logos/press" }
          - name: interests
            label: Areas of interest
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: intro, label: Intro, widget: text }
              - name: items
                label: Items
                widget: list
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: body, label: Description, widget: text }
          - name: speakingPromo
            label: Public-speaking promo
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: text }
              - { name: cta, label: CTA label, widget: string }
          - name: og
            label: Social-share image (OG)
            widget: object
            hint: "These lines appear on the social-share image shown when the HOME page URL is shared (social media / chat previews). The 'Chris Hemmings · Therapist & Coach for Men' lockup and the photo are added automatically."
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: cta, label: CTA pill, widget: string }

      - name: working-together
        label: Therapy & Coaching
        file: src/content/working-together.json
        fields:
          - { name: navLabel, label: Navigation label, widget: string, hint: "How this page appears in the site menu." }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: portrait, label: Portrait image, widget: image, media_folder: "/static/img/photos", public_folder: "/img/photos", hint: "A photograph — it's automatically upscaled + turned into responsive AVIF/WebP on build. Also used for this page's social-share (OG) image." }
              - { name: portraitAlt, label: Portrait alt text, widget: string }
          - { name: intro, label: Intro / how I work, widget: markdown, buttons: [bold, italic, link, heading-two, heading-three, bulleted-list], editor_components: [], modes: [rich_text] }
          - name: qualifications
            label: Qualifications
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: items, label: Items, widget: list, field: { name: item, label: Item, widget: string } }
              - { name: regulatorNote, label: Regulator note, widget: string }
          - name: fees
            label: Fees
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - name: items
                label: Fee cards
                widget: list
                summary: "{{fields.title}} — {{fields.range}}"
                fields:
                  - { name: title, label: Title, widget: string, hint: "e.g. Therapy & Counselling, Coaching" }
                  - { name: range, label: Price / range, widget: string, hint: "e.g. £95–£145, or 'On request'" }
                  - { name: unit, label: Unit, widget: string, hint: "e.g. per 50-minute session" }
                  - { name: body, label: Details, widget: markdown, buttons: [bold, italic], editor_components: [], modes: [rich_text], minimal: true }
          - name: furtherInfo
            label: Further information
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: markdown, buttons: [bold, italic, link], editor_components: [], modes: [rich_text] }
          - name: og
            label: Social-share image (OG)
            widget: object
            hint: "These lines appear on the social-share image shown when the THERAPY & COACHING page URL is shared. The name/tagline lockup and photo are added automatically."
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: cta, label: CTA pill, widget: string }

      - name: public-speaking
        label: Public Speaking
        file: src/content/public-speaking.json
        fields:
          - { name: navLabel, label: Navigation label, widget: string, hint: "How this page appears in the site menu." }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: intro, label: Intro, widget: text }
              - { name: portrait, label: Portrait image, widget: image, media_folder: "/static/img/photos", public_folder: "/img/photos", hint: "A photograph — it's automatically upscaled + turned into responsive AVIF/WebP on build. Also used for this page's social-share (OG) image." }
              - { name: portraitAlt, label: Portrait alt text, widget: string }
              - { name: cta, label: CTA label, widget: string }
          - name: orgsWorkedWith
            label: Organisations worked with
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - name: logos
                label: Logos
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: logo, label: Logo, widget: image }
          - name: experienced
            label: Experienced speaker
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: markdown, buttons: [bold, italic, link], editor_components: [], modes: [rich_text] }
          - name: story
            label: My story
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: markdown, buttons: [bold, italic, link], editor_components: [], modes: [rich_text] }
          - name: talks
            label: Talks
            widget: object
            fields:
              - { name: title, label: Section title, widget: string }
              - name: groups
                label: Categories
                widget: list
                fields:
                  - { name: name, label: Category name, widget: string, hint: "e.g. \"Workshops\" or \"Talks and keynotes\"." }
                  - name: items
                    label: Talks
                    widget: list
                    fields:
                      - { name: title, label: Title, widget: string }
                      - { name: body, label: Body, widget: markdown, buttons: [bold, italic, link], editor_components: [], modes: [rich_text] }
                      - { name: popularWith, label: Popular with, widget: text }
          - name: og
            label: Social-share image (OG)
            widget: object
            hint: "These lines appear on the social-share image shown when the PUBLIC SPEAKING page URL is shared. The name/tagline lockup and photo are added automatically."
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: cta, label: CTA pill, widget: string }

      - name: podcast
        label: Podcast
        file: src/content/podcast.json
        fields:
          - { name: navLabel, label: Navigation label, widget: string, hint: "How this page appears in the site menu." }
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: intro, label: Intro, widget: text }
              - { name: cover, label: Cover image, widget: image }
              - { name: coverAlt, label: Cover alt text, widget: string }
          - name: homeTeaser
            label: Home-page podcast teaser
            hint: "The heading + blurb shown above the latest episodes in the podcast section on the HOME page."
            widget: object
            fields:
              - { name: title, label: Heading, widget: string }
              - { name: blurb, label: Blurb, widget: text }
          - { name: about, label: About the show, widget: markdown, buttons: [bold, italic, link], editor_components: [], modes: [rich_text] }
          - { name: feedPath, label: Feed path, widget: string, hint: "Same-origin proxy path (Caddy → Acast)." }
          - name: platforms
            label: Platforms
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: href, label: Link, widget: string }
          - name: og
            label: Social-share image (OG)
            widget: object
            hint: "These lines appear on the social-share image shown when the PODCAST page URL is shared. The name/tagline lockup and photo of Chris are added automatically."
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: cta, label: CTA pill, widget: string }

      - name: get-in-touch
        label: Get in touch
        file: src/content/get-in-touch.json
        hint: "Page copy only. The email, phone, location and booking CTA shown below it come from General → Contact details and General → Booking CTA."
        fields:
          - { name: navLabel, label: Navigation label, widget: string, hint: "How this page appears in the site menu." }
          - { name: heading, label: Heading, widget: string }
          - { name: intro, label: Intro, widget: text, hint: "Speak to both audiences — individuals seeking therapy and organisations booking talks/workshops." }
          - name: paths
            label: Enquiry paths
            widget: list
            hint: "The two ways to get in touch — one card per audience (e.g. therapy clients, and organisations booking speaking)."
            fields:
              - { name: eyebrow, label: Audience label, widget: string, hint: "e.g. \"For individuals\" / \"For organisations\"." }
              - { name: title, label: Title, widget: string }
              - { name: body, label: Description, widget: text }
              - { name: ctaLabel, label: Button label, widget: string }
              - { name: ctaHref, label: Button link, widget: string, hint: "e.g. \"#contact\" to jump to the booking block, or a mailto: link." }
              - { name: linkLabel, label: Secondary link label, widget: string }
              - { name: linkHref, label: Secondary link, widget: string }
          - name: whatToExpect
            label: What happens next
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string, hint: "Scopes the steps, e.g. \"If you're considering therapy\"." }
              - { name: title, label: Section title, widget: string }
              - name: steps
                label: Steps
                widget: list
                fields:
                  - { name: title, label: Step title, widget: string }
                  - { name: body, label: Step text, widget: text }
          - { name: reassurances, label: Reassurance chips, widget: list, field: { name: item, label: Chip, widget: string }, hint: "Short reassurances shown as chips, e.g. \"No obligation\"." }
          - name: og
            label: Social-share image (OG)
            widget: object
            hint: "These lines appear on the social-share image shown when the GET IN TOUCH page URL is shared. The name/tagline lockup and photo are added automatically."
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: cta, label: CTA pill, widget: string }
